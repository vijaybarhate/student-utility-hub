<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Graduation cap body (mortarboard top) -->
  <polygon points="64,18 116,44 64,70 12,44" fill="#171717"/>
  <!-- Cap brim / band -->
  <ellipse cx="64" cy="44" rx="52" ry="10" fill="#2a2a2a" opacity="0.35"/>
  <!-- Cap body / hanging part -->
  <rect x="44" y="60" width="40" height="30" rx="3" fill="#171717"/>
  <!-- Tassel string -->
  <line x1="108" y1="44" x2="108" y2="82" stroke="#f9cb28" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="108" cy="84" r="5" fill="#f9cb28"/>
  <!-- Tassel threads -->
  <line x1="105" y1="89" x2="103" y2="98" stroke="#f9cb28" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="89" x2="108" y2="99" stroke="#f9cb28" stroke-width="2" stroke-linecap="round"/>
  <line x1="111" y1="89" x2="113" y2="98" stroke="#f9cb28" stroke-width="2" stroke-linecap="round"/>

  <style>
    @media (prefers-color-scheme: dark) {
      polygon { fill: #ffffff; }
      rect { fill: #ffffff; }
      ellipse { fill: #cccccc; }
    }
  </style>
</svg>
